services:
  zhufeng-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zhufeng-student-system
    restart: unless-stopped
    ports:
      - "3021:3021"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3021
      DATABASE_URL: postgresql://zhufeng:zhufeng123@zhufeng-postgres:5432/zhufeng_student?schema=public
      SEED_ON_BOOT: "false"
    depends_on:
      zhufeng-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3021/api/health').then(r=>{if(!r.ok) process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  zhufeng-postgres:
    image: postgres:16
    container_name: zhufeng-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhufeng_student
      POSTGRES_USER: zhufeng
      POSTGRES_PASSWORD: zhufeng123
    ports:
      - "5432:5432"
    volumes:
      - zhufeng-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhufeng -d zhufeng_student"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  zhufeng-postgres-data:
